[extend]
useDefault = true

[allowlist]
description = "Ignore test fixtures, placeholder passwords and dev defaults"
regexes = [
  "change_me_",
  "CHANGE_ME",
  "ci_test_secret_key",
  "workflow_test_pass",
  "staging_test_pass",
  "Admin1234",
  "E2ETest1234",
  "Secure1234",
  "NewStrong123",
  "NewPass5678",
  "Local1234",
  "Member1234",
  "dev_secret_key_change_in_production",
  "workflow_pass",
]
paths = [
  ".env.example",
  "backend/alembic.ini",
  "backend/app/core/config.py",
  "tests/conftest.py",
  "backend/tests/conftest.py",
  # 測試檔內的密碼皆為假資料 placeholder，非真實密鑰
  '''backend/tests/test_.*\.py''',
  ".github/workflows/cd.yml",
  ".github/workflows/ci.yml",
]
