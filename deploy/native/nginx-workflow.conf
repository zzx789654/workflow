# WorkFlow 原生部署 nginx 設定（Ubuntu 24.04）。
# 由 install-native.sh 佈署到 /etc/nginx/sites-available/workflow 並 symlink 啟用。
# serve SPA 靜態檔 + 反向代理 /api、/ws 到本機 backend(127.0.0.1:8000)。
# 憑證由 /opt/workflow/certs 提供，可經前端設定頁熱更換（cert-reload path unit 自動 reload）。

# HTTP → 一律轉址 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    # http2 走 listen 指令的舊語法，相容 nginx 1.24（Ubuntu 24.04 內建）；
    # 新版的 `http2 on;` 獨立指令在 1.24 會 emerg "unknown directive"。
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /opt/workflow/certs/cert.pem;
    ssl_certificate_key /opt/workflow/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 前端 build 靜態檔
    root /opt/workflow/frontend/dist;
    index index.html;

    # 對齊附件 10MB 上限（attachments MAX_SIZE）
    client_max_body_size 10m;

    # 安全標頭（OWASP A02 強化，延續 G06/G07）
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 後端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket（通知 / 專案即時）
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # 後端健康檢查（供外部探活）
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # SPA：靜態檔 + history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
