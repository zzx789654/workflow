name: CI — WorkFlow Secure Build (G5)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  POSTGRES_USER: workflow
  POSTGRES_PASSWORD: workflow_test_pass
  POSTGRES_DB: workflow_test

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff check app tests --output-format=github
      - run: ruff format app tests --check

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://workflow:workflow_test_pass@localhost:5432/workflow_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci_test_secret_key_not_for_production_use
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: http://localhost:5173
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: |
          pip install pytest-cov
          pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=95 -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  frontend-lint-build:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  sast:
    name: SAST Semgrep
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install semgrep
      - name: Semgrep Python
        run: semgrep --config=p/owasp-top-ten --config=p/python --config=p/secrets --error --severity=ERROR backend/app/
      - name: Semgrep TypeScript
        run: semgrep --config=p/typescript --config=p/react --error --severity=ERROR frontend/src/

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca:
    name: SCA Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Python SCA (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --format=columns
      - name: npm audit
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=critical

  build-image:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, sast, secret-scan, sca]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: workflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/workflow-backend.tar
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: workflow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-backend-image
          path: /tmp/workflow-backend.tar
          retention-days: 1
