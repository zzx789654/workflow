[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
  "E501",
  "UP007",   # Optional[X] vs X | None — keep Optional for clarity
  "E712",    # SQLAlchemy ORM requires == True/False for column comparisons
  "UP042",   # str+Enum base class needed for FastAPI/Pydantic serialization
  "F821",    # SQLAlchemy forward references in Mapped[] annotations
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "B", "F811"]
"alembic/*" = ["E402", "I001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.coverage.run]
concurrency = ["asyncio"]
